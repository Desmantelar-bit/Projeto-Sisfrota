<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sisfrota — Controle de Frota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Orbs de fundo -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<section class="hero-section">
    <div class="hero-glass fade-up">

        <div class="hero-logo">🚛</div>

        <h1 class="hero-title">Sisfrota</h1>
        <p class="hero-sub">Plataforma de gestão inteligente de frotas</p>

        <!-- Stats -->
        <div class="stats-row fade-up-2">
            <div class="stat-chip">
                <div class="num" id="statMarcas">—</div>
                <div class="lbl">Marcas</div>
            </div>
            <div class="stat-chip">
                <div class="num" id="statModelos">—</div>
                <div class="lbl">Modelos</div>
            </div>
            <div class="stat-chip">
                <div class="num" id="statVeiculos">—</div>
                <div class="lbl">Veículos</div>
            </div>
        </div>

        <!-- Nav cards -->
        <div class="d-flex flex-column gap-3 fade-up-3">
            <a href="marcas.html" class="nav-card">
                <div class="nav-card-icon" style="background:rgba(99,179,237,0.15);">🏢</div>
                <div class="nav-card-text">
                    <strong>Marcas</strong>
                    <span>Gerencie fabricantes e fornecedores</span>
                </div>
                <span class="nav-card-arrow">›</span>
            </a>
            <a href="modelos.html" class="nav-card">
                <div class="nav-card-icon" style="background:rgba(104,211,145,0.15);">🚘</div>
                <div class="nav-card-text">
                    <strong>Modelos</strong>
                    <span>Catálogo de modelos disponíveis</span>
                </div>
                <span class="nav-card-arrow">›</span>
            </a>
            <a href="veiculos.html" class="nav-card">
                <div class="nav-card-icon" style="background:rgba(246,224,94,0.15);">🚚</div>
                <div class="nav-card-text">
                    <strong>Veículos</strong>
                    <span>Controle completo da sua frota</span>
                </div>
                <span class="nav-card-arrow">›</span>
            </a>
        </div>

    </div>
</section>

<footer>Sisfrota &copy; 2026 — Todos os direitos reservados</footer>

<script type="module">
import { marcaService }  from './js/services/marcaService.js';
import { modeloService } from './js/services/modeloService.js';
import { veiculoService } from './js/services/veiculoService.js';

Promise.all([marcaService.listar(), modeloService.listar(), veiculoService.listar()])
    .then(([m, mo, v]) => {
        document.getElementById('statMarcas').textContent  = m.length;
        document.getElementById('statModelos').textContent = mo.length;
        document.getElementById('statVeiculos').textContent = v.length;
    }).catch(() => {});
</script>
</body>
</html>
