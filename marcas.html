<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sisfrota — Marcas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- Navbar -->
<nav class="navbar navbar-glass navbar-expand-lg px-3">
    <div class="container-lg">
        <a class="navbar-brand" href="index.html">⬡ Sisfrota</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav" style="filter:invert(1)">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item"><a class="nav-link active" href="marcas.html">Marcas</a></li>
                <li class="nav-item"><a class="nav-link" href="modelos.html">Modelos</a></li>
                <li class="nav-item"><a class="nav-link" href="veiculos.html">Veículos</a></li>
            </ul>
        </div>
    </div>
</nav>

<main>
    <div class="container-lg">

        <div class="page-header fade-up">
            <h2>🏢 Marcas</h2>
            <button class="btn btn-glow" id="btnNovo">+ Nova Marca</button>
        </div>

        <div class="glass-table-wrap fade-up-2">
            <table class="glass-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th style="width:140px">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaCorpo"></tbody>
            </table>
        </div>

    </div>
</main>

<!-- Modal -->
<div class="modal fade" id="modalMarca" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <form id="formMarca" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitulo">Nova Marca</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="hidden" id="idField">
                <label class="form-label">NOME DA MARCA</label>
                <input type="text" id="nomeField" class="form-control" placeholder="Ex: Toyota" required>
            </div>
            <div class="modal-footer gap-2 px-4 pb-4">
                <button type="button" class="btn btn-icon" data-bs-dismiss="modal" style="padding:.5rem 1rem">Cancelar</button>
                <button type="submit" class="btn btn-glow">Salvar</button>
            </div>
        </form>
    </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" id="toast-container">
    <div id="toast" class="toast" role="alert">
        <div class="d-flex align-items-center gap-2 p-3">
            <span class="toast-icon" id="toastIcon"></span>
            <span id="toastMsg" style="font-size:.88rem"></span>
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="toast" style="filter:invert(1);opacity:.5"></button>
        </div>
    </div>
</div>

<footer>Sisfrota &copy; 2026</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/controllers/marcaController.js"></script>
</body>
</html>
