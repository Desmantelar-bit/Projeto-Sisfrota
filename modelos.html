<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sisfrota — Modelos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="app">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
        <a href="index.html" class="sidebar-logo">
            <div class="sidebar-logo-icon">🚛</div>
            <div class="sidebar-logo-text">
                <strong>Sisfrota</strong>
                <span>Gestão de Frotas</span>
            </div>
        </a>

        <div class="sidebar-section-label">Menu</div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-link">
                <div class="sidebar-link-icon">⊞</div> Dashboard
            </a>
            <a href="marcas.html" class="sidebar-link">
                <div class="sidebar-link-icon">🏢</div> Marcas
            </a>
            <a href="modelos.html" class="sidebar-link active">
                <div class="sidebar-link-icon">🚘</div> Modelos
            </a>
            <a href="veiculos.html" class="sidebar-link">
                <div class="sidebar-link-icon">🚚</div> Veículos
            </a>
        </nav>

        <div class="sidebar-stats">
            <div class="sidebar-section-label" style="margin-bottom:.4rem">Resumo</div>
            <div class="sidebar-stat">
                <span class="sidebar-stat-label">Marcas</span>
                <span class="sidebar-stat-value" id="sMarcas">—</span>
            </div>
            <div class="sidebar-stat">
                <span class="sidebar-stat-label">Modelos</span>
                <span class="sidebar-stat-value" id="sModelos">—</span>
            </div>
            <div class="sidebar-stat">
                <span class="sidebar-stat-label">Veículos</span>
                <span class="sidebar-stat-value" id="sVeiculos">—</span>
            </div>
        </div>

        <div class="sidebar-version">v1.0.0 &nbsp;·&nbsp; Sisfrota &copy; 2026</div>
    </aside>

    <!-- ── CONTEÚDO ── -->
    <div class="content">
        <div class="content-body">

            <div class="page-header fade-up">
                <h1>🚘 Modelos</h1>
                <button class="btn btn-glow btn-glow-green" id="btnNovo">+ Novo Modelo</button>
            </div>

            <div class="glass-table-wrap fade-up-2">
                <table class="glass-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th style="width:150px">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo"></tbody>
                </table>
            </div>

        </div>
        <footer>
            <span>Sisfrota &copy; 2026</span>
            <span>SENAI · Desenvolvimento Web</span>
        </footer>
    </div>

</div>

<!-- Modal -->
<div class="modal fade" id="modalModelo" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <form id="formModelo" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitulo">Novo Modelo</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="hidden" id="idField">
                <label class="form-label">Nome do Modelo</label>
                <input type="text" id="nomeField" class="form-control" placeholder="Ex: Corolla" required>
            </div>
            <div class="modal-footer gap-2 px-4 pb-4">
                <button type="button" class="btn btn-icon" data-bs-dismiss="modal" style="padding:.5rem 1rem">Cancelar</button>
                <button type="submit" class="btn btn-glow btn-glow-green">Salvar</button>
            </div>
        </form>
    </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" id="toast-container">
    <div id="toast" class="toast" role="alert">
        <div class="d-flex align-items-center gap-2 p-3">
            <span id="toastIcon"></span>
            <span id="toastMsg" style="font-size:.85rem"></span>
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="toast" style="filter:invert(1);opacity:.4"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/controllers/modeloController.js"></script>
<script type="module">
import { marcaService }   from './js/services/marcaService.js';
import { modeloService }  from './js/services/modeloService.js';
import { veiculoService } from './js/services/veiculoService.js';
Promise.all([marcaService.listar(), modeloService.listar(), veiculoService.listar()])
    .then(([m, mo, v]) => {
        document.getElementById('sMarcas').textContent   = m.length;
        document.getElementById('sModelos').textContent  = mo.length;
        document.getElementById('sVeiculos').textContent = v.length;
    }).catch(() => {});
</script>
</body>
</html>
